version: "3.3"

services:

  greenit-cli-influxdb:
    image: ${INFLUXDB_IMAGE_VERSION}
    container_name: greenit-cli-influxdb
    ports:
      - '8086:8086'
    volumes:
      - greenit-cli-influxdb-storage:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB_NAME}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_USERNAME}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD}
    networks:
      - greenit-cli-network

  greenit-cli-grafana:
    container_name: greenit-cli-grafana
    image: ${GRAFANA_IMAGE_VERSION}
    ports:
      - '3000:3000'
    volumes:
      - greenit-cli-grafana-storage:/var/lib/grafana
      - /grafana-provisioning/provisioning:/etc/grafana/provisioning
      - /grafana-provisioning/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - greenit-cli-influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
    networks:
      - greenit-cli-network

volumes:
  greenit-cli-influxdb-storage:
  greenit-cli-grafana-storage:

networks:
  greenit-cli-network: